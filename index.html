<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Best Class Evaluation & Verification System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <p class="eyebrow">Marian College</p>
      <h1>Best Class Evaluation System</h1>
      <p class="muted">Select your role to continue into the evaluation workspace.</p>

      <form id="login-form" class="stack-form">
        <div class="field">
          <label for="login-role">Choose Role</label>
          <select id="login-role" name="role">
            <option value="student">Student</option>
            <option value="leader">Class Leader</option>
            <option value="teacher">Class Teacher</option>
            <option value="evaluator">Evaluator</option>
            <option value="admin">Admin</option>
            <option value="hod">HOD / IQAC</option>
          </select>
        </div>

        <button type="submit" class="btn primary full">Enter Workspace</button>
      </form>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="page-bootstrap.js"></script>
  <script src="index.js"></script>
  <script src="script.js"></script>
</body>
</html>
