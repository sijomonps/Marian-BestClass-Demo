<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOD Dashboard | Best Class Evaluation & Verification System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-initial-role="hod" data-initial-page="dashboard">
  <div id="login-screen" class="login-screen hidden">
    <div class="login-card">
      <p class="eyebrow">College Activity Tracker</p>
      <h1>Best Class Evaluation &amp; Verification System</h1>
      <p class="muted">Prototype login for role-based dashboard flow. No real authentication is used.</p>

      <form id="login-form" class="stack-form">
        <div class="field">
          <label for="login-email">Email</label>
          <input id="login-email" name="email" type="email" placeholder="name@college.edu" />
        </div>

        <div class="field">
          <label for="login-password">Password</label>
          <input id="login-password" name="password" type="password" placeholder="Enter password" />
        </div>

        <div class="field">
          <label for="login-role">Role</label>
          <select id="login-role" name="role">
            <option value="student">Student</option>
            <option value="teacher">Class Teacher</option>
            <option value="evaluator">Evaluator</option>
            <option value="admin">Admin</option>
            <option value="hod">HOD / IQAC</option>
          </select>
        </div>

        <button type="submit" class="btn primary full">Login</button>
      </form>
    </div>
  </div>

  <div id="app-shell" class="app-shell">
    <aside id="sidebar" class="sidebar">
      <div class="brand">
        <div class="brand-mark">BC</div>
        <div>
          <h2>Best Class</h2>
          <p>Evaluation Panel</p>
        </div>
      </div>

      <nav class="sidebar-nav">
        <ul id="sidebar-nav"></ul>
      </nav>

      <div class="sidebar-foot">
        <p id="sidebar-role-label">Student</p>
      </div>
    </aside>

    <div class="main-shell">
      <header class="topbar">
        <button id="menu-toggle" class="menu-toggle" type="button" aria-label="Toggle sidebar">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <div class="topbar-title">
          <h2 id="topbar-heading">Dashboard</h2>
          <p id="topbar-subheading">Role-based prototype mode</p>
        </div>

        <div class="topbar-controls">
          <button id="logout-btn" type="button" class="btn ghost">Logout</button>
        </div>
      </header>

      <main id="page-content" class="page-content"></main>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="script.js"></script>
</body>
</html>
